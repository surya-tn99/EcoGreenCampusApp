<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EcoCampus - Add Eco Activity</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e7f32",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 pt-6 pb-4 flex items-center gap-4">
<button class="flex items-center justify-center size-10 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div>
<h1 class="text-xl font-bold leading-none">Add Eco Activity 🌱</h1>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Log your eco-friendly action</p>
</div>
</header>
<main class="flex-1 overflow-y-auto pb-24">
<!-- Section 1: Activity Categories -->
<section class="px-4 py-4">
<h2 class="text-lg font-bold mb-4">Activity Category</h2>
<div class="flex flex-col gap-1.5 mb-6">
<label class="text-sm font-bold ml-1">Select Category</label>
<div class="relative">
<select class="w-full appearance-none py-3 px-4 pr-10 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary transition-all text-sm font-medium">
<option disabled="" selected="" value="">Choose a category...</option>
<option value="waste-management">Waste Management</option>
<option value="energy-saving">Energy Saving</option>
<option value="water-conservation">Water Conservation</option>
<option value="plantation">Plantation</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
</div>
</div>
</section>
<!-- Section 2: Form -->
<section class="px-4 py-6 space-y-6">
<div class="space-y-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-bold ml-1">Activity Description</label>
<textarea class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary transition-all py-3 px-4 min-h-[100px]" placeholder="Tell us more about what you did..."></textarea>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-bold ml-1">Location</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">location_on</span>
<input class="w-full pl-10 pr-4 py-3 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary" placeholder="Main Campus Square" type="text"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-bold ml-1">Date</label>
<input class="w-full py-3 px-4 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary" type="date"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-bold ml-1">Time</label>
<input class="w-full py-3 px-4 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary" type="time"/>
</div>
</div>
<button class="w-full border-2 border-dashed border-primary/40 rounded-xl p-6 flex flex-col items-center justify-center gap-2 bg-primary/5 hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-3xl text-primary">add_a_photo</span>
<span class="text-sm font-medium text-primary">Upload Proof Photo</span>
</button>
</div>
</section>
<!-- Section 3: Points Preview -->
<section class="px-4 pb-6">
<div class="bg-primary/10 border border-primary/20 rounded-xl p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined material-symbols-fill">stars</span>
</div>
<div>
<p class="text-xs font-medium text-slate-600 dark:text-slate-400">Estimated reward</p>
<p class="text-base font-bold text-slate-900 dark:text-slate-100">Points you will earn</p>
</div>
</div>
<div class="text-2xl font-black text-primary">+20</div>
</div>
</section>
<!-- Section 4: Submit Button -->
<section class="px-4 pb-12">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                Log Eco Activity
            </button>
</section>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 pb-safe">
<div class="flex items-center justify-around h-16 max-w-md mx-auto">
<a class="flex flex-col items-center justify-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined material-symbols-fill">eco</span>
<span class="text-[10px] font-bold">Activities</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="text-[10px] font-medium">Leaderboard</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Profile</span>
</a>
</div>
</nav>
</body></html>
