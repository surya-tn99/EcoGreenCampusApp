<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e7f32",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>EcoCampus - Success</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar (Header) -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-between border-b border-primary/10">
<button class="text-primary flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Success</h2>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center p-6 max-w-md mx-auto w-full">
<!-- Illustration/Icon Container -->
<div class="relative w-full aspect-square mb-8 flex items-center justify-center">
<!-- Background Decorative Element -->
<div class="absolute inset-0 bg-primary/5 rounded-full scale-90 blur-3xl"></div>
<div class="relative flex flex-col items-center">
<div class="w-32 h-32 bg-primary/10 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary !text-7xl">eco</span>
</div>
<!-- Status Badge -->
<div class="bg-primary text-white px-4 py-1 rounded-full flex items-center gap-2 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined !text-sm">check_circle</span>
<span class="text-sm font-semibold uppercase tracking-wider">Submitted</span>
</div>
</div>
</div>
<!-- Text Content -->
<div class="text-center space-y-4">
<h1 class="text-slate-900 dark:text-slate-100 text-[28px] font-bold leading-tight px-4">
                Complaint Submitted Successfully 🌱
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed px-6">
                Thank you for helping improve campus sustainability. Our team will look into this issue shortly.
            </p>
</div>
<!-- Action Button -->
<div class="w-full mt-10 px-4">
<a class="flex items-center justify-center w-full py-4 bg-gradient-to-r from-primary to-primary/80 text-white font-bold rounded-xl shadow-xl shadow-primary/20 hover:opacity-90 transition-all active:scale-[0.98]" href="#">
                Back to Home
            </a>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="flex gap-2 border-t border-primary/10 bg-background-light dark:bg-background-dark px-4 pb-6 pt-2 sticky bottom-0">
<a class="flex flex-1 flex-col items-center justify-center gap-1 rounded-full text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined fill-1">home</span>
</div>
<p class="text-xs font-semibold leading-normal tracking-[0.015em]">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 opacity-60" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">description</span>
</div>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Reports</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 opacity-60" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">map</span>
</div>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">EcoMap</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 opacity-60" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Profile</p>
</a>
</nav>
</body></html>
