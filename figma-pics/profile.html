<!DOCTYPE html>

<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e7f32",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]

                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",

    </script>

        .material-symbols-outlined {
