<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EcoCampus - Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e7f32",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #2e7f32;
        }
        .toggle-checkbox:checked + .toggle-label .toggle-dot {
            transform: translateX(100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="relative flex min-h-screen flex-col max-w-md mx-auto bg-white dark:bg-zinc-900 shadow-xl overflow-hidden">
<!-- Header -->
<header class="sticky top-0 z-10 flex items-center bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md px-4 py-4 border-b border-primary/10">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-200">arrow_back</span>
</button>
<h1 class="flex-1 text-center text-lg font-bold tracking-tight pr-10">Settings</h1>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto pb-24">
<!-- Account Section -->
<section class="mt-6 px-4">
<h2 class="px-2 mb-2 text-xs font-bold uppercase tracking-wider text-primary">Account</h2>
<div class="bg-primary/5 dark:bg-white/5 rounded-xl overflow-hidden">
<button class="flex w-full items-center gap-4 px-4 py-4 hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary">person</span>
<span class="flex-1 text-left font-medium">Edit Profile</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<div class="mx-4 border-t border-primary/10"></div>
<button class="flex w-full items-center gap-4 px-4 py-4 hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary">lock</span>
<span class="flex-1 text-left font-medium">Change Password</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<div class="mx-4 border-t border-primary/10"></div>
<button class="flex w-full items-center gap-4 px-4 py-4 hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary">shield_person</span>
<span class="flex-1 text-left font-medium">Privacy Settings</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
</div>
</section>
<!-- Preferences Section -->
<section class="mt-8 px-4">
<h2 class="px-2 mb-2 text-xs font-bold uppercase tracking-wider text-primary">Preferences</h2>
<div class="bg-primary/5 dark:bg-white/5 rounded-xl overflow-hidden">
<!-- Push Notifications -->
<div class="flex items-center gap-4 px-4 py-4">
<span class="material-symbols-outlined text-primary">notifications</span>
<span class="flex-1 font-medium">Push Notifications</span>
<div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer outline-none top-0" id="toggle1" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer transition-colors duration-200" for="toggle1">
<span class="toggle-dot block w-6 h-6 rounded-full bg-white shadow transform transition-transform duration-200"></span>
</label>
</div>
</div>
<div class="mx-4 border-t border-primary/10"></div>
<!-- Email Notifications -->
<div class="flex items-center gap-4 px-4 py-4">
<span class="material-symbols-outlined text-primary">mail</span>
<span class="flex-1 font-medium">Email Notifications</span>
<div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer outline-none top-0" id="toggle2" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer transition-colors duration-200" for="toggle2">
<span class="toggle-dot block w-6 h-6 rounded-full bg-white shadow transform transition-transform duration-200"></span>
</label>
</div>
</div>
<div class="mx-4 border-t border-primary/10"></div>
<!-- Dark Mode -->
<div class="flex items-center gap-4 px-4 py-4">
<span class="material-symbols-outlined text-primary">dark_mode</span>
<span class="flex-1 font-medium">Dark Mode</span>
<div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer outline-none top-0" id="toggle3" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer transition-colors duration-200" for="toggle3">
<span class="toggle-dot block w-6 h-6 rounded-full bg-white shadow transform transition-transform duration-200"></span>
</label>
</div>
</div>
<div class="mx-4 border-t border-primary/10"></div>
<!-- Language -->
<button class="flex w-full items-center gap-4 px-4 py-4 hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary">language</span>
<span class="flex-1 text-left font-medium">Language</span>
<span class="text-sm text-primary font-semibold mr-1">English</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
</div>
</section>
<!-- Support Section -->
<section class="mt-8 px-4">
<h2 class="px-2 mb-2 text-xs font-bold uppercase tracking-wider text-primary">Support</h2>
<div class="bg-primary/5 dark:bg-white/5 rounded-xl overflow-hidden">
<button class="flex w-full items-center gap-4 px-4 py-4 hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary">help</span>
<span class="flex-1 text-left font-medium">Help Center</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<div class="mx-4 border-t border-primary/10"></div>
<button class="flex w-full items-center gap-4 px-4 py-4 hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary">description</span>
<span class="flex-1 text-left font-medium">Terms of Service</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<div class="mx-4 border-t border-primary/10"></div>
<button class="flex w-full items-center gap-4 px-4 py-4 hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary">policy</span>
<span class="flex-1 text-left font-medium">Privacy Policy</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<div class="mx-4 border-t border-primary/10"></div>
<button class="flex w-full items-center gap-4 px-4 py-4 hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary">eco</span>
<span class="flex-1 text-left font-medium">About EcoCampus</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
</div>
</section>
<!-- Footer Section -->
<section class="mt-12 px-4 pb-8 flex flex-col items-center gap-4">
<button class="w-full flex items-center justify-center gap-2 py-4 rounded-xl bg-red-50 text-red-600 font-bold border border-red-100 hover:bg-red-100 transition-colors">
<span class="material-symbols-outlined">logout</span>
                    Log Out
                </button>
<p class="text-sm text-slate-400">EcoCampus v1.0.2</p>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="absolute bottom-0 left-0 right-0 flex border-t border-primary/10 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-md px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 transition-colors text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-bold uppercase tracking-widest">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 transition-colors text-slate-400" href="#">
<span class="material-symbols-outlined">list_alt</span>
<p class="text-[10px] font-bold uppercase tracking-widest">Activities</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 transition-colors text-slate-400" href="#">
<span class="material-symbols-outlined">trophy</span>
<p class="text-[10px] font-bold uppercase tracking-widest">Leaderboard</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 transition-colors text-primary" href="#">
<span class="material-symbols-outlined fill-1" style="font-variation-settings: 'FILL' 1;">settings</span>
<p class="text-[10px] font-bold uppercase tracking-widest">Settings</p>
</a>
</nav>
</div>
</body></html>
